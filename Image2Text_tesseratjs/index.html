<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Handwritten Image To Text Generator</title>

    <link rel="stylesheet" href="css/App.css">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">

    <script src="https://unpkg.com/tesseract.js@2.0.0-beta.1/dist/tesseract.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
    <div class="outerbody">
        <!--Navbar-->
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container">
                <a class="navbar-brand" href="#">
                    <img src="/favicon.png" alt="logo" width="35" height="35">
                    OCR
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="/documentation.html">Docmentation</a>
                        </li>
                    </ul>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </nav>


        <!--Card for uploading the imgs-->
        <div class="card text-center">
            <div class="card-header">
            </div>
            <div class="card-body">
                <h5 class="card-title">Upload Image</h5>
                <p class="card-text" style="
                border: 2px dotted black;
                padding: 10px;
                width: 350px;
                margin: auto;
            ">

                    <input type="file" accept='image/*' id="input-image">
                </p>
            </div>

            <div class="card-footer text-body-secondary model-selection" style="  display: flex;
                        align-items: center;
                        justify-content: center;
                        gap: 25px;">
                Mode:
                <button type="button" class="btn btn-primary" id="model1">Digital Text</button>
                <button type="button" class="btn btn-primary" id="model2">Handwritten Text</button>
            </div>
        </div>

        <!--Wrapper-->
        <div class="wrapper">
            <div class="grid-item">
                <h3>Preview Image</h3>
                <div class="image-wrapper">
                    <img src="" id="preview-image">
                    <canvas id="canvas"></canvas>
                </div>
            </div>

            <div class="grid-item">
                <h3>Extracted Text</h3>

                <button class="btn btn-primary" type="button" disabled id="spinner"
                    style="display: none; margin: 10px;">
                    <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                    Processing...
                </button>

                <textarea class="form-control" id="extracted-text" rows="14" readonly></textarea>
            </div>
        </div>


        <!---Footer-->
        <div class="card text-center">
            <div class="card-header">
            </div>
            <div class="card-body">
                <h5 class="card-title">
                    <p>&copy; 2026 Vivek. All rights reserved.</p>
                </h5>
                <p class="card-text"></p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script type="module" src="js/script.js"></script>
</body>

</html>
