<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NextWeather | A Weather Prediction Model</title>

  <link rel="shortcut icon" href="/assets/favicon.png" type="image/x-icon">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="css/responsive.css">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <div class="wrapper">

    <div class="grid-item">

      <div class="row">
        <button onclick="getLocation()">
          <img src="./assets/location-dot-solid-full.svg" alt="location-dot-solid-full">
        </button>
        <input type="text" id="search-bar" placeholder="Enter City Name">
        <Button id="search-btn">
          <img src="./assets/magnifying-glass-solid-full.svg" alt="magnifying-glass-solid-full">
        </Button>
      </div>

      <div class="info">
        <h2 id="temp"></h2>
        <p id="feels-like" style="margin-bottom: 35px;"></p>
        <span>
          <h3 id="clouds"></h3><small>Clouds</small>
        </span>

        <span>
          <h3 id="humidity"></h3><small>Humidity</small>
        </span>

        <span>
          <h3 id="windspeed"></h3><small>Wind Speed</small>
        </span>

        <span>
          <h3 id="pressure"></h3><small>Pressure</small>
        </span>

      </div>
    </div>

    <div class="grid-item">
      <div id="error-msg"></div>

      <h6>Weather Forecast</h6>

      <h1 id="description1"></h1>

      <h6 class="city-info">
        <p id="city-name"></p>
        <p id="datetime"></p>
      </h6>

      <h6 id="coords"></h6>

      <h6 id="description2"></h6>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="/js/script.js"></script>

</body>

</html>
